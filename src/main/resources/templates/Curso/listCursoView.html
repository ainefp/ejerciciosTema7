<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
</head>
<body class="p-3">
    <div class="container">
    <!-- MENÚ DE NAVEGACIÓN -->
    <nav th:fragment="menu" class="navbar navbar-dark bg-dark navbar-expand-sm">
        <ul class="navbar-nav">
            <li><a class="nav-link active" th:href="@{/}">Cursos</a></li>
            <li><a class="nav-link active" th:href="@{/autores/}">Autores</a></li>
            <li><a class="nav-link active" th:href="@{/videos/}">Videos</a></li>
        </ul>
    </nav>

    <h1 class="mb-3">Lista de Cursos</h1>

    <!-- BUSCAR POR NOMBRE -->
    <div class="d-flex gap-2">
        <form method="post" action="#" th:action="@{/findByName}" th:object="${findForm}">
            <label>Buscar por nombre:<input type="text" name="nombre" th:field="*{nombre}"/></label>
            <input type="submit" value="Buscar"/>
        </form>
        <a th:href="@{/list}" class="btn btn-secondary">Reestablecer</a>
    </div>

    <!-- BUSCAR POR TEMÁTICA -->
    <form method="post" action="#" th:action="@{/findByTheme}" th:object="${findTheme}">
        <label>Buscar por temática</label>
        <select name="tematica" th:field="*{tematica}">
            <option th:each="tema : ${T(com.example.ejercicio601.domain.Tematica).values()}" 
                    th:value="${tema}" 
                    th:text="${tema}"></option>
        </select>
        <input type="submit" value="Buscar"/>
    </form>

    <!-- BUSCAR POR AUTOR -->
    <form method="post" action="#" th:action="@{/findByAutor}" th:object="${findAutor}">
        <label>Buscar por autor</label>
        <select name="id" th:field="*{id}">
            <option th:each="autor : ${listaAutores}" 
                    th:value="${autor.id}" 
                    th:text="${autor.nombre}"></option>
        </select>
        <input type="submit" value="Buscar"/>
    </form>

    <!-- LISTA DE CURSOS -->
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Autor</th>
                <th>Tematica</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="curso : ${listaCursos}">
                <td th:text="${curso.id}">ID</td>
                <td><a th:href="@{/{id}(id=${curso.id})}" th:text="${curso.nombre}"></a></td>
                <td th:text="${curso.precio}">Precio</td>
                <td th:text="${curso.autor.nombre}">Autor</td>
                <td th:text="${curso.tematica}">Tematica</td>
                <td>
                    <a th:href="@{/editar/{id}(id=${curso.id})}" class="btn btn-primary btn-sm">Editar</a>
                    <a th:href="@{/borrar/{id}(id=${curso.id})}" class="btn btn-outline-danger btn-sm ms-2">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- MENSAJE DE ERROR -->
    <p th:if="${msg!=null}" class="alert alert-info" role="alert"><span th:text="${msg}">err</span></p>
    
    <!-- NUEVO CURSO -->
    <a th:href="@{/nuevo}" class="btn btn-success">Nuevo Curso</a>

    <!-- BUSCAR POR PRECIO MENOR A -->
    <div class="d-flex gap-2">
        <form method="post" action="#" th:action="@{/findByPrice}" th:object="${findPrice}">
            <label>Buscar por precio menor a: <input type="number" name="precio" th:field="*{precio}"/></label>
            <input type="submit" value="Buscar"/>
        </form>
    </div>
    
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
