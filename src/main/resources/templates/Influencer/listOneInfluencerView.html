<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{Curso/listCursoView :: head}"></head>
<body class="p-3">

    <div class="container">
        <div th:replace="~{Curso/listCursoView :: menu}"></div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario de Instagram</th>
                    <th>Cursos Asociados</th>
                </tr>
            </thead>
            <tbody class="align-middle">
                <tr>
                    <td th:text="${influencer.id}">ID</td>
                    <td th:text="${influencer.UsrIgrm}">Usuario de Instagram</td>
                    <td>
                        <ul class="ps-0 mb-0 list-unstyled">
                            <li th:each="curso : ${cursosAsociados}">
                                <a th:href="@{/{id}(id=${curso.id})}" th:text="${curso.nombre}">Curso Asociado</a>
                            </li>
                        </ul>
                    </td>
                </tr>
            </tbody>
        </table>

        <div>
            <a th:href="@{/influencers}" class="btn btn-primary">Volver a la lista</a>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
