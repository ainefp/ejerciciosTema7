<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{listView :: head}"></head>
  <body class="p-3">
    <div class="container">
      <div th:replace="~{listView :: menu}"></div>
      <h1 class="mb-3">Editar Curso</h1>
      <div th:if="${errorMsg}" class="alert alert-danger" role="alert" th:text="${errorMsg}"></div>
      <form
        method="post"
        action="#"
        th:action="@{/editar/submit}"
        th:object="${curso}"
        class="row g-3"
      >
        <div class="col-12 col-md-6">
          <label for="nombre" class="form-label">Nombre</label>
          <input
            type="text"
            class="form-control"
            id="nombre"
            th:field="*{nombre}"
          />
        </div>

        <div class="col-12 col-md-6">
          <label for="precio" class="form-label">Precio</label>
          <input
            type="number"
            class="form-control"
            id="precio"
            th:field="*{precio}"
          />
        </div>

        <div class="col-12">
          <label for="autorId" class="form-label">Autor</label>
          <select name="autorId" id="autorId" class="form-select">
            <option value="">-- Sin autor --</option>
            <option th:each="a : ${listaAutores}"
                    th:value="${a.id}"
                    th:selected="${curso.autor != null && curso.autor.id == a.id}"
                    th:text="${a.nombre}"></option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label d-block">Temática</label>
          <div
            class="form-check form-check-inline"
            th:each="tema : ${T(com.example.ejercicio601.domain.Tematica).values()}"
          >
            <input
              class="form-check-input"
              type="radio"
              th:field="*{tematica}"
              th:value="${tema}"
              id="temaEdit__${tema}"
            />
            <label
              class="form-check-label"
              th:for="${'temaEdit__' + tema}"
              th:text="${tema}"
              >Tematica</label
            >
          </div>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-success">Guardar Cambios</button>
          <a th:href="@{/}" class="btn btn-secondary ms-2">Cancelar</a>
        </div>
      </form>
    </div>
    <script
      th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
