<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{Curso/listCursoView :: head}"></head>
<body class="p-3">
    <div class="container">
        <div th:replace="~{Curso/listCursoView :: menu}"></div>
        <h1 class="mb-3">Lista de Videos</h1>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Descripción</th>
                    <th>Duración (Segundos)</th>
                    <th>Enlace a YouTube</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="video : ${listaVideos}">
                    <td th:text="${video.id}">ID</td>
                    <td><a th:href="@{/videos/{id}(id=${video.id})}" th:text="${video.descripcion}">Descripción</a></td>
                    <td th:text="${video.duracionSegundos}">Duración (Segundos)</td>
                    <td><a th:href="|https://www.youtube.com/watch?v=${video.idYoutube}|" target="_blank">
                        <img th:src="|https://img.youtube.com/vi/${video.idYoutube}/hqdefault.jpg|" style="width: 60px;" />
                    </a></td>
                    <td>
                        <a th:href="@{/videos/editar/{id}(id=${video.id})}" class="btn btn-primary btn-sm">Editar</a>
                        <a th:href="@{/videos/borrar/{id}(id=${video.id})}" class="btn btn-outline-danger btn-sm ms-2">Borrar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <p th:if="${msg != null}" class="alert alert-info" role="alert">
            <span th:text="${msg}"></span>
        </p>

        <div class="d-flex gap-2">
            <a th:href="@{/videos/nuevo}" class="btn btn-success">Nuevo Video</a>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
