<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{Curso/listCursoView :: head}"></head>
<body class="p-3">
    <div class="container">
        <div th:replace="~{Curso/listCursoView :: menu}"></div>
        <h1 class="mb-3">Lista de Cursos (7.8)</h1>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                </tr>
            </thead>
            <tbody class="align-middle">
                <tr th:each="curso : ${listaCursos}">
                    <td th:text="${curso.id}">ID</td>
                    <td th:text="${curso.nombre}">Nombre</td>
                    <td th:text="${curso.precio}">Precio</td>
                </tr>
            </tbody>
        </table>

        <div>
            <a th:href="@{/pagIni}" class="btn btn-secondary">Pág Inicial</a>
            <a th:href="@{/pagAnt}" class="btn btn-primary ms-2">Pág ant</a>
            <a th:href="@{/pagSig}" class="btn btn-primary ms-2">Pág sig</a>
            <a th:href="@{/pagFin}" class="btn btn-secondary ms-2">Pág Final</a>
        </div>

        <p th:if="${errorMsg!=null}" class="alert alert-info" role="alert"><span th:text="${errorMsg}">err</span></p>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
