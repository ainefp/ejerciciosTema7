<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <title>Document</title>

</head>
<body class="p-3">
    <div class="container">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Tematica</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cur : ${curso}">
                    <td th:text="${cur.id}">ID</td>
                    <td><a th:href="@{/{id}(id=${cur.id})}" th:text="${cur.nombre}"></a></td>
                    <td th:text="${cur.precio}">Precio</td>
                    <td th:text="${cur.tematica}">Tematica</td>
                </tr>
            </tbody>
        </table>

        <div>
            <a th:href="@{/}" class="btn btn-primary">Volver a la lista</a>
        </div>
    </div>

        <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
