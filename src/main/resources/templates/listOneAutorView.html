<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Autor</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
</head>
<body class="p-3">
    <div class="container">
        <div th:replace="~{listView :: menu}"></div>
        <h1 class="mb-3">Detalle del Autor</h1>
        <dl class="row">
            <dt class="col-sm-2">ID</dt>
            <dd class="col-sm-10" th:text="${autor.id}"></dd>
            <dt class="col-sm-2">Nombre</dt>
            <dd class="col-sm-10" th:text="${autor.nombre}"></dd>
            <dt class="col-sm-2">Email</dt>
            <dd class="col-sm-10" th:text="${autor.email}"></dd>
        </dl>

        <h2 class="mt-4">Cursos del autor</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Temática</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="curso : ${autor.cursos}">
                    <td th:text="${curso.id}"></td>
                    <td th:text="${curso.nombre}"></td>
                    <td th:text="${curso.precio}"></td>
                    <td th:text="${curso.tematica}"></td>
                </tr>
            </tbody>
        </table>

        <div class="d-flex gap-2 mt-3">
            <a th:href="@{/autores/editar/{id}(id=${autor.id})}" class="btn btn-primary">Editar</a>
            <a th:href="@{/autores}" class="btn btn-secondary">Volver</a>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
